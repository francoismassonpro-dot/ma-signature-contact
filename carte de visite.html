<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Visite Numérique - François Masson</title>
    
    <!-- 
        Tentative de chargement de la librairie QRCode (Version Build Navigateur).
        Si ce script est bloqué, le code JS basculera sur une API externe.
    -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <style>
        /* Couleurs du Thème Sombre (Inspiré Material Design 3) */
        :root {
            --color-surface: #1e1e1e;   /* Fond de carte */
            --color-background: #121212; /* Fond de la page */
            --color-on-surface: #e0e0e0; /* Texte principal clair */
            --color-primary: #a8c7fa;    /* Accent principal (boutons, liens) */
            --color-on-primary: #1e1e1e; /* Texte sur le primaire */
            --color-secondary-text: #bdbdbd; /* Texte secondaire/gris */
        }

        /* Styles de base */
        body {
            font-family: 'Inter', sans-serif; /* Utilisation d'une police moderne */
            background-color: var(--color-background);
            /* Utilisation de Flexbox pour centrer parfaitement */
            display: flex;
            justify-content: center; /* Centrage horizontal */
            align-items: center; /* Centrage vertical */
            min-height: 100vh;
            margin: 0;
            color: var(--color-on-surface);
        }

        /* Conteneur de la carte (Surface M3) */
        .card-container {
            background-color: var(--color-surface);
            padding: 30px;
            border-radius: 16px; 
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4); 
            
            /* Contrôle de la taille de la carte elle-même */
            max-width: 350px; 
            min-width: 280px; 
            width: 90%;       

            text-align: center;
            transition: box-shadow 0.3s ease;
        }

        /* Logo/Photo de profil (Rectangulaire) */
        .logo {
            width: 180px;
            height: 120px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            object-fit: contain; 
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            color: var(--color-on-surface);
            font-size: 28px; 
            font-weight: 700;
            margin: 0 0 5px 0; 
        }

        .title {
            color: var(--color-primary); 
            font-size: 16px; 
            font-weight: 500;
            margin-bottom: 25px; 
        }

        /* Section des coordonnées */
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0; 
        }

        .contact-item a {
            color: var(--color-secondary-text); 
            text-decoration: none;
            transition: color 0.3s ease;
            margin-left: 10px; 
            font-size: 15px; 
        }
        .contact-item a:hover {
            color: var(--color-primary); 
        }
        
        .contact-item svg {
            width: 18px; 
            height: 18px; 
            fill: var(--color-secondary-text); 
            flex-shrink: 0;
        }

        /* Section des liens sociaux */
        .social-links {
            margin-top: 30px; 
            margin-bottom: 30px; 
            display: flex;
            justify-content: center;
            gap: 20px; 
        }
        .social-links a svg {
            width: 28px; 
            height: 28px; 
            fill: var(--color-secondary-text);
            transition: fill 0.3s ease;
        }
        .social-links a:hover svg {
            fill: var(--color-primary); 
        }
        
        /* --- Styles du QR Code --- */
        .qrcode-style {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #ffffff; /* Fond blanc pour assurer le contraste du QR Code */
            border-radius: 12px;
            display: inline-block; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .qrcode-label {
            color: #333333; /* Texte sombre sur fond blanc */
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 0;
            font-weight: 500;
        }

        /* Image QR Code */
        #qrcode-img { 
            width: 150px; 
            height: 150px;
            display: block;
            /* Placeholder animé pendant le chargement */
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* ------------------------ */

        .cta-button {
            display: block;
            padding: 14px 24px; 
            background-color: var(--color-primary);
            color: var(--color-on-primary); 
            text-decoration: none;
            font-weight: bold;
            border-radius: 24px; 
            margin-top: 30px; 
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            font-size: 18px;
        }
        .cta-button:hover {
            background-color: #d1e5ff; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- Logo Infragenia -->
        <img src="https://lh3.googleusercontent.com/d/17zHyHT_kdcsZsJsI-hPxKYMySj0Eu9El" 
             alt="Logo Infragenia" 
             class="logo"
             onerror="this.onerror=null; this.src='https://placehold.co/180x120/1e1e1e/a8c7fa?text=Infragenia'"> 
        
        <h1>François Masson</h1>
        <p class="title">Président chez Infragenia</p>
        
        <div class="contact-info">
            <!-- Téléphone -->
            <div class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M19.95 18.15c-.45-.45-1-.6-1.55-.45-1.1.3-2.3.45-3.55.45-1.35 0-2.6-.15-3.7-.45-1.2-.35-2.2-.85-3.15-1.8-1.05-.95-1.6-2.15-1.95-3.45-.3-1.15-.45-2.35-.45-3.5 0-1.25.15-2.45.45-3.55.15-.55.3-1.1.45-1.55.15-.55 0-1.1-.45-1.55L4.4 3.9c-.35-.35-.75-.5-1.2-.5-.45 0-.85.15-1.2.45-.5.5-.75 1.1-.75 1.75 0 1.25.15 2.5.45 3.75.4 1.7 1.2 3.3 2.3 4.8 1.45 1.8 3.3 3.3 5.3 4.3 2 1.05 4.15 1.7 6.4 2.05 1.25.3 2.5.45 3.75.45.65 0 1.25-.25 1.75-.75.3-.3.45-.7.45-1.2 0-.45-.15-.85-.45-1.2z"/></svg>
                <a href="tel:+33689234283">+33 6 89 23 42 83</a>
            </div>
            <!-- Email -->
            <div class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"/></svg>
                <a href="mailto:francois.masson@infragenia.com">francois.masson@infragenia.com</a>
            </div>
            <!-- Site Web -->
            <div class="contact-item" style="margin-bottom: 25px;"> 
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.95-7-7.93 0-.68.11-1.34.31-1.97l6.69 6.69v3.21zm-7.9-10.87c.18-.74.45-1.47.8-2.14l5.13 5.13-5.93-2.99zm4.25-6.84c.67-.35 1.4-.62 2.14-.8L7.84 9.1l-2.99-5.93zm6.84-4.25c.74.18 1.47.45 2.14.8l-5.13 5.13 2.99 5.93zm-3.21 7.9c.49 3.95 3.95 7 7.93 7 .68 0 1.34-.11 1.97-.31L12.07 12l-3.21 3.21z"/></svg>
                <a href="https://www.infragenia.com" target="_blank">www.infragenia.com</a>
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/francois-m-863383212/" target="_blank" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.565-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.355 7 3.391v5.844z"/></svg>
            </a>
        </div>

        <!-- Conteneur QR Code -->
        <div id="qrcode-container" class="qrcode-style">
            <img id="qrcode-img" alt="QR Code VCard" src="">
            <p class="qrcode-label">Scannez pour ajouter le contact</p>
        </div>
        
        <a href="Francois-Masson-Infragenia.vcf" download="Francois-Masson-Infragenia.vcf" class="cta-button">
            TÉLÉCHARGER LA VCARD
        </a>
    </div>

    <script>
        // Fonction principale
        window.onload = function () {
            
            // 1. Données
            const contactData = {
                name: 'Masson',
                firstName: 'François',
                title: 'Président',
                org: 'Infragenia',
                tel: '+33689234283',
                email: 'francois.masson@infragenia.com',
                url: 'https://www.infragenia.com',
                linkedin: 'https://www.linkedin.com/in/francois-m-863383212/'
            };

            // 2. Création de la VCard
            const vCardContent = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `N:${contactData.name};${contactData.firstName};;;`,
                `FN:${contactData.firstName} ${contactData.name}`,
                `ORG:${contactData.org}`,
                `TITLE:${contactData.title}`,
                `TEL;TYPE=WORK,VOICE:${contactData.tel}`,
                `EMAIL;TYPE=PREF,INTERNET:${contactData.email}`,
                `URL;TYPE=WORK:${contactData.url}`,
                `X-SOCIALPROFILE;type=linkedin;x-user=${contactData.linkedin.split('/').pop()}:${contactData.linkedin}`,
                'END:VCARD'
            ].join('\n'); 

            const imgElement = document.getElementById('qrcode-img');
            
            // 3. Essayer d'utiliser la librairie JS locale
            try {
                if (typeof QRCode !== 'undefined' && QRCode.toDataURL) {
                    console.log("Librairie QRCode détectée. Génération locale...");
                    QRCode.toDataURL(vCardContent, {
                        errorCorrectionLevel: 'M',
                        margin: 2,
                        type: 'image/png',
                        color: {
                            dark: '#000000',
                            light: '#ffffff' // Transparent impossible pour reader, blanc préférable
                        },
                        width: 200
                    }, function (error, url) {
                        if (error) throw error;
                        imgElement.src = url;
                        // Retirer l'animation de chargement
                        imgElement.style.animation = 'none';
                        imgElement.style.background = 'none';
                    });
                } else {
                    throw new Error("Librairie QRCode absente ou incompatible.");
                }
            } catch (e) {
                // 4. FALLBACK : Si la librairie échoue, on utilise une API publique
                console.warn("Échec de la génération locale (" + e.message + "). Utilisation de l'API de secours.");
                
                // Encodage de la vCard pour l'URL
                const encodedVCard = encodeURIComponent(vCardContent);
                // Utilisation de l'API quickchart.io (fiable et rapide)
                imgElement.src = `https://quickchart.io/qr?text=${encodedVCard}&size=200&ecLevel=M&margin=1`;
                
                imgElement.style.animation = 'none';
                imgElement.style.background = 'none';
            }
        };
    </script>
</body>
</html>
