    <!-- Librairie QRCode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        :root {
            --color-surface: #1e1e1e;
            --color-background: #121212;
            --color-on-surface: #e0e0e0;
            --color-primary: #a8c7fa;
            --color-on-primary: #072d5e;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--color-background);
            color: var(--color-on-surface);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .viewport-wrapper {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 10px;
        }

        .card-container {
            background-color: var(--color-surface);
            padding: 35px 24px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #share-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(168, 199, 250, 0.1);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #share-btn svg { width: 22px; height: 22px; fill: var(--color-primary); }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; color: white; }
        .title-label { color: var(--color-primary); font-size: 15px; margin-bottom: 25px; font-weight: 500; display: block; }

        .contact-list { text-align: left; margin-bottom: 25px; }
        
        .contact-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 8px;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        .contact-link:active { background: rgba(255, 255, 255, 0.08); }

        .contact-link svg {
            width: 20px;
            height: 20px;
            fill: var(--color-primary);
            margin-right: 12px;
            flex-shrink: 0;
        }

        .contact-link span { font-size: 13.5px; line-height: 1.4; }

        .qr-wrapper {
            background: white;
            padding: 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
        }

        #qrcode-canvas { 
            display: block; 
            width: 180px !important; 
            height: 180px !important; 
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="card-container">
            <button id="share-btn" onclick="openShareMenu()">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
            </button>

            <img src="https://lh3.googleusercontent.com/d/17zHyHT_kdcsZsJsI-hPxKYMySj0Eu9El" alt="Logo Infragenia" class="logo">
            
            <h1>François Masson</h1>
            <span class="title-label">Président chez Infragenia</span>

            <div class="contact-list">
                <a href="tel:+33689234283" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    <span>+33 6 89 23 42 83</span>
                </a>
                <a href="mailto:francois.masson@infragenia.com" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <span>francois.masson@infragenia.com</span>
                </a>
                <a href="https://www.infragenia.com" target="_blank" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.95-7-7.93 0-.68.11-1.34.31-1.97l6.69 6.69v3.21zm-7.9-10.87c.18-.74.45-1.47.8-2.14l5.13 5.13-5.93-2.99zm4.25-6.84c.67-.35 1.4-.62 2.14-.8L7.84 9.1l-2.99-5.93zm6.84-4.25c.74.18 1.47.45 2.14.8l-5.13 5.13 2.99 5.93zm-3.21 7.9c.49 3.95 3.95 7 7.93 7 .68 0 1.34-.11 1.97-.31L12.07 12l-3.21 3.21z"/></svg>
                    <span>www.infragenia.com</span>
                </a>
                <!-- L'adresse de Beaucaire mise à jour -->
                <a href="https://www.google.com/maps/search/?api=1&query=13+BIS+quai+de+la+paix+nord+30300+BEAUCAIRE" target="_blank" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    <span>Immeuble Le Prisme - 13 BIS quai de la paix nord, 30300 BEAUCAIRE</span>
                </a>
            </div>

            <div class="qr-wrapper">
                <canvas id="qrcode-canvas"></canvas>
            </div>

            <button id="vcard-btn" class="btn-main">
                <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Ajouter aux contacts
            </button>
        </div>
    </div>

    <script>
        // Tentative d'enregistrement classique du Service Worker (si le fichier sw.js existe)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {
                    console.log("Mode PWA limité (sans sw.js physique)");
                });
            });
        }

        const contact = {
            fn: 'François Masson',
            tel: '+33689234283',
            email: 'francois.masson@infragenia.com',
            org: 'Infragenia',
            adr: 'Immeuble Le Prisme - 13 BIS quai de la paix nord, 30300 BEAUCAIRE',
            url: window.location.href
        };

        const vCardValue = `BEGIN:VCARD\nVERSION:3.0\nFN:${contact.fn}\nORG:${contact.org}\nTEL;TYPE=CELL:${contact.tel}\nEMAIL:${contact.email}\nADR;TYPE=WORK:;;${contact.adr}\nURL:${contact.url}\nEND:VCARD`;

        function renderQR() {
            const canvas = document.getElementById('qrcode-canvas');
            if (window.QRCode) {
                QRCode.toCanvas(canvas, vCardValue, { 
                    width: 360,
                    margin: 0,
                    color: { dark: '#121212', light: '#ffffff' }
                });
            } else { setTimeout(renderQR, 200); }
        }

        async function openShareMenu() {
            if (navigator.share) {
                try {
                    await navigator.share({ title: contact.fn, url: contact.url });
                } catch (e) {}
            } else {
                navigator.clipboard.writeText(contact.url);
            }
        }

        document.getElementById('vcard-btn').onclick = () => {
            const blob = new Blob([vCardValue], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Francois_Masson.vcf';
            a.click();
        };

        window.onload = renderQR;
    </script>
</body>
</html>
