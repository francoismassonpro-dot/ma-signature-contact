<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>François Masson - Infragenia</title>
    
    <!-- QRCode Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <style>
        :root {
            --color-surface: #1e1e1e;
            --color-background: #121212;
            --color-on-surface: #e0e0e0;
            --color-primary: #a8c7fa;
            --color-on-primary: #1e1e1e;
            --color-secondary-text: #bdbdbd;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--color-on-surface);
        }

        .card-container {
            background-color: var(--color-surface);
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
            max-width: 360px;
            width: 90%;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo {
            width: 160px;
            height: auto;
            max-height: 100px;
            border-radius: 8px;
            margin-bottom: 20px;
            object-fit: contain;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.5px;
        }

        .title {
            color: var(--color-primary);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 28px;
        }

        .contact-info {
            text-align: left;
            margin-bottom: 24px;
            display: inline-block;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
        }

        .contact-item a {
            color: var(--color-secondary-text);
            text-decoration: none;
            margin-left: 12px;
            font-size: 15px;
            transition: color 0.2s;
        }

        .contact-item a:hover {
            color: var(--color-primary);
        }

        .contact-item svg {
            width: 20px;
            height: 20px;
            fill: var(--color-primary);
            flex-shrink: 0;
        }

        .social-links {
            margin: 24px 0;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .social-links a svg {
            width: 32px;
            height: 32px;
            fill: var(--color-secondary-text);
            transition: fill 0.2s, transform 0.2s;
        }

        .social-links a:hover svg {
            fill: var(--color-primary);
            transform: translateY(-2px);
        }

        .qrcode-section {
            margin-top: 24px;
            background-color: #ffffff;
            padding: 16px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #qrcode-img {
            width: 140px;
            height: 140px;
            display: block;
        }

        .qrcode-label {
            color: #121212;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cta-button {
            display: block;
            padding: 16px 32px;
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            text-decoration: none;
            font-weight: 700;
            border-radius: 30px;
            margin-top: 32px;
            box-shadow: 0 4px 12px rgba(168, 199, 250, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        .cta-button:hover {
            background-color: #c2d7ff;
            transform: scale(1.02);
        }

        /* Skeleton loader for QR */
        .loading-qr {
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .loading-qr::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- Logo -->
        <img src="https://lh3.googleusercontent.com/d/17zHyHT_kdcsZsJsI-hPxKYMySj0Eu9El" 
             alt="Infragenia" 
             class="logo"
             onerror="this.src='https://placehold.co/180x120/1e1e1e/a8c7fa?text=Infragenia'">
        
        <h1>François Masson</h1>
        <p class="title">Président chez Infragenia</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <a href="tel:+33689234283">+33 6 89 23 42 83</a>
            </div>
            <div class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <a href="mailto:francois.masson@infragenia.com">francois.masson@infragenia.com</a>
            </div>
            <div class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.95-7-7.93 0-.68.11-1.34.31-1.97l6.69 6.69v3.21zm-7.9-10.87c.18-.74.45-1.47.8-2.14l5.13 5.13-5.93-2.99zm4.25-6.84c.67-.35 1.4-.62 2.14-.8L7.84 9.1l-2.99-5.93zm6.84-4.25c.74.18 1.47.45 2.14.8l-5.13 5.13 2.99 5.93zm-3.21 7.9c.49 3.95 3.95 7 7.93 7 .68 0 1.34-.11 1.97-.31L12.07 12l-3.21 3.21z"/></svg>
                <a href="https://www.infragenia.com" target="_blank">www.infragenia.com</a>
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/francois-m-863383212/" target="_blank" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
            </a>
        </div>

        <div class="qrcode-section">
            <img id="qrcode-img" alt="QR Code" class="loading-qr">
            <p class="qrcode-label">Ajouter au répertoire</p>
        </div>
        
        <button id="vcard-btn" class="cta-button">
            ENREGISTRER LE CONTACT
        </button>
    </div>

    <script>
        const contactData = {
            lastName: 'Masson',
            firstName: 'François',
            title: 'Président',
            org: 'Infragenia',
            tel: '+33689234283',
            email: 'francois.masson@infragenia.com',
            url: 'https://www.infragenia.com',
            linkedin: 'https://www.linkedin.com/in/francois-m-863383212/'
        };

        const vCardContent = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            `FN:${contactData.firstName} ${contactData.lastName}`,
            `N:${contactData.lastName};${contactData.firstName};;;`,
            `ORG:${contactData.org}`,
            `TITLE:${contactData.title}`,
            `TEL;TYPE=CELL,VOICE:${contactData.tel}`,
            `EMAIL;TYPE=WORK,INTERNET:${contactData.email}`,
            `URL:${contactData.url}`,
            `URL;type=LinkedIn:${contactData.linkedin}`,
            'END:VCARD'
        ].join('\r\n');

        // Generation du QR Code
        function generateQR() {
            const img = document.getElementById('qrcode-img');
            try {
                if (window.QRCode) {
                    QRCode.toDataURL(vCardContent, {
                        margin: 1,
                        width: 280,
                        errorCorrectionLevel: 'M'
                    }, (err, url) => {
                        if (err) throw err;
                        img.src = url;
                        img.classList.remove('loading-qr');
                    });
                } else {
                    throw new Error('Lib not loaded');
                }
            } catch (e) {
                // Fallback API
                img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(vCardContent)}`;
                img.onload = () => img.classList.remove('loading-qr');
            }
        }

        // Telechargement VCard
        document.getElementById('vcard-btn').onclick = function() {
            const blob = new Blob([vCardContent], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `${contactData.firstName}-${contactData.lastName}.vcf`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 100);
        };

        window.onload = generateQR;
    </script>
</body>
</html>
