<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>François Masson - Infragenia</title>
    
    <!-- Méta-tags pour le plein écran mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Librairie QRCode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        :root {
            --color-surface: #1e1e1e;
            --color-background: #121212;
            --color-on-surface: #e0e0e0;
            --color-primary: #a8c7fa;
            --color-on-primary: #072d5e;
            --color-secondary-text: #bdbdbd;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--color-background);
            color: var(--color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Empêche le défilement rebondissant sur iOS */
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Conteneur principal adaptatif */
        .viewport-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .card-container {
            background-color: var(--color-surface);
            padding: 40px 24px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #share-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        #share-btn:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.9); }
        #share-btn svg { width: 20px; height: 20px; fill: white; }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
        .title { color: var(--color-primary); font-size: 15px; margin-bottom: 30px; font-weight: 500; }

        .contact-list { text-align: left; margin-bottom: 24px; }
        
        .contact-link {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 10px;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .contact-link:active { background: rgba(255, 255, 255, 0.1); border-color: var(--color-primary); }

        .contact-link svg {
            width: 20px;
            height: 20px;
            fill: var(--color-primary);
            margin-right: 14px;
            flex-shrink: 0;
        }

        .contact-link span { font-size: 14px; font-weight: 400; line-height: 1.4; }

        .qr-wrapper {
            background: white;
            padding: 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 24px;
            transition: var(--transition);
        }

        #qrcode-canvas { display: block; width: 140px !important; height: 140px !important; }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }

        .btn-main:active { transform: scale(0.97); opacity: 0.9; }

        /* Notification Toast au lieu d'une alerte */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #323232;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="card-container">
            <button id="share-btn" onclick="copyToClipboard()" title="Partager">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
            </button>

            <img src="https://lh3.googleusercontent.com/d/17zHyHT_kdcsZsJsI-hPxKYMySj0Eu9El" alt="Logo Infragenia" class="logo">
            
            <h1>François Masson</h1>
            <p class="title">Président chez Infragenia</p>

            <div class="contact-list">
                <a href="tel:+33689234283" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    <span>+33 6 89 23 42 83</span>
                </a>
                <a href="mailto:francois.masson@infragenia.com" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <span>francois.masson@infragenia.com</span>
                </a>
                <a href="https://www.infragenia.com" target="_blank" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.95-7-7.93 0-.68.11-1.34.31-1.97l6.69 6.69v3.21zm-7.9-10.87c.18-.74.45-1.47.8-2.14l5.13 5.13-5.93-2.99zm4.25-6.84c.67-.35 1.4-.62 2.14-.8L7.84 9.1l-2.99-5.93zm6.84-4.25c.74.18 1.47.45 2.14.8l-5.13 5.13 2.99 5.93zm-3.21 7.9c.49 3.95 3.95 7 7.93 7 .68 0 1.34-.11 1.97-.31L12.07 12l-3.21 3.21z"/></svg>
                    <span>www.infragenia.com</span>
                </a>
                <a href="https://www.linkedin.com/in/francois-m-863383212/" target="_blank" class="contact-link">
                    <svg viewBox="0 0 24 24"><path d="M19 3a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14m-.5 15.5v-5.3a3.26 3.26 0 00-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 011.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 001.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 00-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                    <span>Profil LinkedIn</span>
                </a>
            </div>

            <div class="qr-wrapper">
                <canvas id="qrcode-canvas"></canvas>
            </div>

            <button id="vcard-btn" class="btn-main">
                <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Ajouter au répertoire
            </button>
        </div>
    </div>

    <!-- Notification discrète -->
    <div id="toast">
        <svg style="width:20px;height:20px;fill:#a8c7fa" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Lien copié dans le presse-papier
    </div>

    <script>
        const contact = {
            fn: 'François Masson',
            tel: '+33689234283',
            email: 'francois.masson@infragenia.com',
            org: 'Infragenia',
            url: window.location.href
        };

        const vCardValue = `BEGIN:VCARD\nVERSION:3.0\nFN:${contact.fn}\nORG:${contact.org}\nTEL;TYPE=CELL:${contact.tel}\nEMAIL:${contact.email}\nURL:${contact.url}\nEND:VCARD`;

        function renderQR() {
            const canvas = document.getElementById('qrcode-canvas');
            if (window.QRCode) {
                QRCode.toCanvas(canvas, vCardValue, { 
                    width: 250, 
                    margin: 0,
                    color: { dark: '#121212', light: '#ffffff' }
                });
            } else { setTimeout(renderQR, 200); }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function copyToClipboard() {
            try {
                // Tente d'abord le partage natif (plus propre sur mobile)
                if (navigator.share) {
                    await navigator.share({ title: contact.fn, url: contact.url });
                } else {
                    throw new Error('Share not supported');
                }
            } catch (e) {
                // Secours : Copie dans le presse-papier
                const el = document.createElement('textarea');
                el.value = contact.url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast();
            }
        }

        document.getElementById('vcard-btn').onclick = () => {
            const blob = new Blob([vCardValue], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Francois_Masson.vcf';
            a.click();
        };

        window.onload = renderQR;
    </script>
</body>
</html>
